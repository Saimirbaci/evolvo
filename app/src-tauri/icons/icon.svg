<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Background: rounded-square in slate-900, echoing the app's dark chrome -->
  <rect x="0" y="0" width="1024" height="1024" rx="208" ry="208" fill="#0f172a"/>

  <!-- Subtle inner border to give the tile depth -->
  <rect x="24" y="24" width="976" height="976" rx="188" ry="188"
        fill="none" stroke="#1e293b" stroke-width="4"/>

  <!-- The white canvas: the product's core surface -->
  <rect x="200" y="200" width="624" height="624" rx="56" ry="56" fill="#ffffff"/>

  <!-- Faint canvas grid to hint at "drawing board" without dominating -->
  <g stroke="#e2e8f0" stroke-width="2" stroke-linecap="round">
    <line x1="240" y1="360" x2="784" y2="360"/>
    <line x1="240" y1="512" x2="784" y2="512"/>
    <line x1="240" y1="664" x2="784" y2="664"/>
    <line x1="392" y1="240" x2="392" y2="784"/>
    <line x1="544" y1="240" x2="544" y2="784"/>
    <line x1="696" y1="240" x2="696" y2="784"/>
  </g>

  <!-- Bold wordmark "Nø" — the "No IDE / No Idea" reading -->
  <g font-family="ui-sans-serif, -apple-system, 'Helvetica Neue', Arial, sans-serif"
     font-weight="900" font-size="420" text-anchor="middle">
    <!-- N in slate-900 for strong contrast on the white canvas -->
    <text x="430" y="640" fill="#0f172a" letter-spacing="-20">N</text>
    <!-- Ø (O with a slash) in amber — the spark of an idea cutting through -->
    <text x="660" y="640" fill="#f59e0b" letter-spacing="-20">ø</text>
  </g>

  <!-- Pencil stroke across the canvas — the "drawing board is always reachable" mark -->
  <g stroke="#f59e0b" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.9">
    <line x1="260" y1="756" x2="764" y2="268"/>
  </g>
  <!-- Pencil tip spark -->
  <circle cx="764" cy="268" r="28" fill="#f59e0b"/>
  <circle cx="764" cy="268" r="14" fill="#ffffff"/>
</svg>
